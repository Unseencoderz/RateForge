name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages first
        run: |
          pnpm --filter @rateforge/types build
          pnpm --filter @rateforge/config build

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Coverage report
        if: always()
        run: pnpm -r test -- --coverage 2>/dev/null || true
