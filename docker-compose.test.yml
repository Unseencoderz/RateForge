version: '3.8'

# This compose file is specifically for integration testing.
# It provisions only the backing infrastructure required to run isolated tests.
# CI hooks use this to execute robust integration tests using a real redis process.

services:
  redis:
    image: redis:7-alpine
    container_name: rateforge-redis-test
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
