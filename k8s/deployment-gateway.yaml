apiVersion: apps/v1
kind: Deployment
metadata:
  name: rateforge-gateway
  labels:
    app: rateforge-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rateforge-gateway
  template:
    metadata:
      labels:
        app: rateforge-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/unseencoderz/rateforge/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: rateforge-gateway-config
            - secretRef:
                name: rateforge-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '250m'
              memory: '256Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
