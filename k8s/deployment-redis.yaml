apiVersion: apps/v1
kind: Deployment
metadata:
  name: rateforge-redis
  labels:
    app: rateforge-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rateforge-redis
  template:
    metadata:
      labels:
        app: rateforge-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '1Gi'
          livenessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 5
            periodSeconds: 5
