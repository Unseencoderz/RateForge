apiVersion: v1
kind: ConfigMap
metadata:
  name: rateforge-gateway-config
  labels:
    app: rateforge-gateway
data:
  NODE_ENV: 'production'
  PORT: '3000'
  LOG_LEVEL: 'info'
  # In Kubernetes, we use the internal service name for Redis
  REDIS_URL: 'redis://rateforge-redis:6379'
  RATE_LIMITER_URL: 'http://rateforge-limiter:3001'
  DOWNSTREAM_TARGET_URL: 'http://rateforge-downstream:8080'
