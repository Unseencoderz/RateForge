apiVersion: apps/v1
kind: Deployment
metadata:
  name: rateforge-limiter
  labels:
    app: rateforge-limiter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rateforge-limiter
  template:
    metadata:
      labels:
        app: rateforge-limiter
    spec:
      containers:
        - name: limiter
          image: ghcr.io/yourusername/rateforge-rate-limiter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: rateforge-limiter-config
            - secretRef:
                name: rateforge-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
