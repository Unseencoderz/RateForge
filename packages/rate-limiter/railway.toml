[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @rateforge/types build && pnpm --filter @rateforge/config build && pnpm --filter @rateforge/rate-limiter build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
