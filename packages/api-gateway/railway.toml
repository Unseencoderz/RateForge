[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @rateforge/types build && pnpm --filter @rateforge/config build && pnpm --filter @rateforge/api-gateway build"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
